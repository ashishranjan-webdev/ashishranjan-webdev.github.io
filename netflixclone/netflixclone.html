<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="netfixclone.css">
  <script src="netflixclone.js"></script>
</head>
<body>

  <!-- Navbar -->
  <header>
    <h1 class="logo">NETFLIX</h1>
    <button class="btn">Sign In</button>
  </header>

  <!-- Banner -->
  <section class="banner">
    <h2>Unlimited Movies, TV Shows & More</h2>
    <p>Watch anywhere. Cancel anytime.</p>
    <button class="btn">Get Started</button>
  </section>

  <!-- Movies Row -->
  <section class="row">
    <h2>Popular on Netflix</h2>
    <div class="row-posters">
      <img src="https://via.placeholder.com/200x300" />
      <img src="https://via.placeholder.com/200x300" />
      <img src="https://via.placeholder.com/200x300" />
      <img src="https://via.placeholder.com/200x300" />
    </div>
  </section>

  <section class="row">
    <h2>Trending Now</h2>
    <div class="row-posters">
      <img src="https://via.placeholder.com/200x300" />
      <img src="https://via.placeholder.com/200x300" />
      <img src="https://via.placeholder.com/200x300" />
      <img src="https://via.placeholder.com/200x300" />
    </div>
  </section>

  <script src="netflixclone.js"></script>
</body>
</html>
